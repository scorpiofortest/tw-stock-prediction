services:
  - type: web
    name: tw-stock-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./data/twstock.db"
    plan: free
    autoDeploy: true
